<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Field Pro V12.7</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #map-container { flex: 1; height: 100vh; position: relative; transition: all 0.3s ease; border-right: 2px solid #ccc; display: block; }
        #map { height: 100%; width: 100%; background: #222; }
        #map-container.map-hidden { display: none !important; }

        .panel { width: 600px; background: var(--bg); display: flex; flex-direction: column; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: all 0.3s ease; }
        .panel.panel-full { width: 100% !important; }
        
        .header { background: var(--s-navy); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--s-lime); }
        .header img { height: 40px; }

        .toolbar { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-gps { grid-column: span 2; background: var(--s-navy); color: white; height: 70px; border: none; font-size: 1.2rem; font-weight: bold; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #0d2b42; }
        .btn-gps:active { transform: translateY(3px); box-shadow: 0 2px 0 #0d2b42; }
        
        button.action { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; background: white; color: var(--s-navy); cursor: pointer; }

        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #ddd; }
        .stat-card small { font-size: 0.7rem; color: #666; display: block; }
        .stat-card b { font-size: 1.1rem; color: var(--s-navy); }

        .table-wrap { flex: 1; overflow: auto; margin: 0 15px 15px 15px; background: white; border-radius: 15px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px; position: sticky; top: 0; border-bottom: 2px solid var(--s-lime); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .coord-val { font-family: monospace; font-weight: bold; color: #c0392b; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 40vh; width: 100%; border-right: none; }
            .panel { width: 100%; height: 60vh; }
            .panel.panel-full { height: 100vh !important; }
        }
    </style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<div class="panel" id="main-panel">
    <div class="header">
        <img src="logo.png" alt="Syntro">
        <span style="font-weight: bold;">V12.7 PRO</span>
        <button class="action" onclick="toggleVista()" style="background:var(--s-lime); border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">🗺️ MAPA ON/OFF</button>
    </div>
    
    <div class="toolbar">
        <button id="mainBtn" class="btn-gps" onclick="capturar()">📍 CAPTURAR VÉRTICE</button>
        <button class="action" onclick="exportGeoJSON()">📥 GEOJSON</button>
        <button class="action" onclick="exportCSV()">📥 EXCEL (CSV)</button>
        <button style="color:#e74c3c; grid-column: span 2; font-size: 0.85rem; background: none; border: none; cursor:pointer; font-weight:bold;" onclick="limpiar()">🗑️ BORRAR TODO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ZONA UTM</small><b id="utm-zona">-</b></div>
        <div class="stat-card"><small>ÁREA (HA)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERIM (M)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>TIPO</th>
                    <th>ESTE (X)</th>
                    <th>NORTE (Y)</th>
                    <th>DIST (m)</th>
                    <th>OBS</th>
                    <th>DEL</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('syntro_v12_7')) || [];
    let marcadores = [];
    let areaHectareas = 0;
    let perimetroMetros = 0;
    
    const map = L.map('map', { zoomControl: false }).setView([10.5, -67], 6);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const capaPol = L.polygon([], {color: '#d9ed92', weight: 4, fillOpacity: 0.3}).addTo(map);

    function toggleVista() {
        document.getElementById('map-container').classList.toggle('map-hidden');
        document.getElementById('main-panel').classList.toggle('panel-full');
        setTimeout(() => map.invalidateSize(), 400);
    }

    function getUTMData(lat, lng) {
        const zone = Math.floor((lng + 180) / 6) + 1;
        const def = `+proj=utm +zone=${zone} +ellps=WGS84 +datum=WGS84 +units=m +no_defs`;
        const coords = proj4("EPSG:4326", def, [lng, lat]);
        return { x: coords[0], y: coords[1], zone: zone };
    }

    function capturar() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "🛰️ BUSCANDO GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            const utm = getUTMData(lat, lng);
            datos.push({ lat, lng, x: utm.x, y: utm.y, zone: utm.zone, tipo: 'POL', dist: 0, obs: '' });
            btn.innerText = "📍 CAPTURAR VÉRTICE";
            actualizar();
            map.setView([lat, lng], 19);
        }, err => { alert("Error GPS"); btn.innerText = "📍 CAPTURAR VÉRTICE"; }, 
        { enableHighAccuracy: true, timeout: 15000 });
    }

    function actualizar() {
        localStorage.setItem('syntro_v12_7', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        
        let ptsPol = [];
        let totalP = 0;
        let lastX = null, lastY = null;

        datos.forEach((p, i) => {
            if(p.tipo === 'POL') {
                if(lastX !== null) p.dist = Math.sqrt(Math.pow(p.x - lastX, 2) + Math.pow(p.y - lastY, 2));
                totalP += p.dist; lastX = p.x; lastY = p.y;
                ptsPol.push([p.lat, p.lng]);
            }
            const color = p.tipo === 'POL' ? '#184e77' : '#e67e22';
            marcadores.push(L.circleMarker([p.lat, p.lng], { radius: 6, color: 'white', fillColor: color, fillOpacity: 1 }).addTo(map));
            
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td><select onchange="cambiarTipo(${i}, this.value)"><option value="POL" ${p.tipo==='POL'?'selected':''}>POL</option><option value="PTS" ${p.tipo==='PTS'?'selected':''}>PTS</option></select></td>
                <td class="coord-val">${p.x.toFixed(2)}</td><td class="coord-val">${p.y.toFixed(2)}</td>
                <td>${p.dist.toFixed(2)}</td>
                <td><input type="text" value="${p.obs}" onchange="cambiarObs(${i}, this.value)" style="width:80px"></td>
                <td onclick="borrar(${i})" style="color:red; cursor:pointer">×</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = totalP.toFixed(2);
        document.getElementById('utm-zona').innerText = datos.length ? datos[0].zone + "N" : "-";
        if(ptsPol.length > 2) {
            areaHectareas = turf.area(capaPol.toGeoJSON()) / 10000;
            document.getElementById('area-val').innerText = areaHectareas.toFixed(4);
        }
    }

    function cambiarTipo(i, v) { datos[i].tipo = v; actualizar(); }
    function cambiarObs(i, v) { datos[i].obs = v; localStorage.setItem('syntro_v12_7', JSON.stringify(datos)); }
    function borrar(i) { datos.splice(i,1); actualizar(); }
    function limpiar() { if(confirm("¿Borrar?")) { datos = []; actualizar(); } }

    // EXPORTACIONES REPARADAS CON BLOB
    function exportGeoJSON() {
        if(!datos.length) return;
        const feat = datos.map((p, i) => ({
            type: "Feature", geometry: { type: "Point", coordinates: [p.lng, p.lat] },
            properties: { id: i+1, tipo: p.tipo, x: p.x, y: p.y, obs: p.obs }
        }));
        const pol = datos.filter(p => p.tipo === 'POL').map(p => [p.lng, p.lat]);
        if(pol.length > 2) {
            pol.push(pol[0]);
            feat.push({ type: "Feature", geometry: { type: "Polygon", coordinates: [pol] }, properties: { area: areaHectareas } });
        }
        descargar(JSON.stringify({ type: "FeatureCollection", features: feat }), `SYN_${Date.now()}.geojson`, "application/json");
    }

    function exportCSV() {
        if(!datos.length) return;
        let csv = "ID,TIPO,X,Y,DIST,OBS\n";
        datos.forEach((p, i) => csv += `${i+1},${p.tipo},${p.x},${p.y},${p.dist},"${p.obs}"\n`);
        descargar(csv, `SYN_${Date.now()}.csv`, "text/csv");
    }

    function descargar(contenido, nombre, tipo) {
        const blob = new Blob([contenido], { type: tipo });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = nombre;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    actualizar();
</script>
</body>
</html>
