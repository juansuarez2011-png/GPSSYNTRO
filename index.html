<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Field Pro V12 - Full UTM Fix</title>
    
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <script src="proj4.js"></script>
    <script src="turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #map-container { flex: 1; height: 100vh; position: relative; border-right: 2px solid #ccc; transition: all 0.3s ease; }
        #map { height: 100%; width: 100%; background: #333; }
        #map-container.map-hidden { flex: 0; min-width: 0; width: 0; overflow: hidden; border: none; }

        .btn-toggle-map {
            position: absolute; top: 10px; left: 10px; z-index: 1100;
            padding: 10px; background: white; border: 2px solid var(--s-navy);
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        /* Panel Neumórfico */
        .panel { 
            width: 550px; background: var(--bg); display: flex; flex-direction: column; 
            z-index: 10; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }

        .header { background: var(--s-navy); color: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--s-lime); }
        .header img { height: 30px; }

        .toolbar { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-gps { 
            grid-column: span 2; background: var(--s-navy); color: white; height: 60px; 
            border: none; font-size: 1.1rem; font-weight: bold; border-radius: 12px; 
            box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; cursor: pointer;
        }
        
        button { 
            padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; 
            cursor: pointer; font-size: 0.7rem; background: var(--bg); color: var(--s-navy);
            box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 10px; margin-bottom: 5px; }
        .stat-card { background: var(--bg); padding: 8px; border-radius: 10px; text-align: center; box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }
        .stat-card b { font-size: 1.2rem; color: var(--s-navy); display: block; }

        /* Tabla con scroll y columnas completas */
        .table-wrap { flex: 1; overflow: auto; margin: 10px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 500px; }
        th { background: #f1f3f5; padding: 8px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; text-transform: uppercase; }
        td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #eee; }
        
        .utm-col { font-family: 'Courier New', monospace; font-weight: bold; color: #d32f2f; background: #fffcfc; }
        input[type="text"], select { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 4px; font-size: 0.7rem; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 30vh; flex: none; width: 100%; }
            .panel { width: 100%; height: 70vh; }
            #map-container.map-hidden { height: 0; }
            .panel.full-screen { height: 100vh; }
        }
    </style>
</head>
<body>

<div id="map-container">
    <button class="btn-toggle-map" onclick="toggleMapa()" id="mapBtn">🗺️ OCULTAR MAPA</button>
    <div id="map"></div>
</div>

<div class="panel" id="sidePanel">
    <div class="header">
        <img src="logo.png" alt="SYNTRO" onerror="this.style.display='none'">
        <div style="font-weight: bold; letter-spacing: 1px;">GPS FIELD PRO V12.1</div>
    </div>

    <div class="toolbar">
        <button class="btn-gps" onclick="capturar()">📍 MARCAR VÉRTICE (GPS)</button>
        <button id="backupBtn" style="display:none; background: var(--s-lime);" onclick="toggleMapa()">🗺️ VER MAPA</button>
        <button onclick="exportGeo()">📥 GEOJSON (POL+PTS)</button>
        <button onclick="exportCSV()">📥 CSV (EXCEL)</button>
        <button style="color:red; grid-column: span 2;" onclick="limpiar()">🗑️ BORRAR LEVANTAMIENTO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ÁREA (ha)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERÍMETRO (m)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>VRT</th>
                    <th style="width:80px">TIPO</th>
                    <th>COORD X (E)</th>
                    <th>COORD Y (N)</th>
                    <th>DIST(m)</th>
                    <th>OBSERVACIONES</th>
                    <th>-</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuración UTM Zona 19N (Norte de Venezuela)
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    let datos = JSON.parse(localStorage.getItem('syntro_v12_base')) || [];
    let marcadores = [];

    const map = L.map('map', { zoomControl: false }).setView([10.64, -71.61], 16);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const capaPol = L.polygon([], {color: '#d9ed92', weight: 4, fillOpacity: 0.4}).addTo(map);

    function toggleMapa() {
        const container = document.getElementById('map-container');
        const panel = document.getElementById('sidePanel');
        const backupBtn = document.getElementById('backupBtn');
        container.classList.toggle('map-hidden');
        if(container.classList.contains('map-hidden')) {
            backupBtn.style.display = "block";
            if(window.innerWidth <= 850) panel.classList.add('full-screen');
        } else {
            backupBtn.style.display = "none";
            panel.classList.remove('full-screen');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
    }

    function capturar() {
        const conf = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
        
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            
            // Si la precisión es mayor a 12m, advertimos (útil para edificios)
            if(accuracy > 12) {
                if(!confirm(`Señal débil (${accuracy.toFixed(1)}m). ¿Capturar punto de todas formas?`)) return;
            }

            const utm = proj4("EPSG:4326", utm19N, [lng, lat]);
            let d = 0;
            
            // Calculamos distancia plana desde el último punto del polígono
            const soloPol = datos.filter(x => x.tipo === 'POL');
            if(soloPol.length > 0) {
                const last = soloPol[soloPol.length-1];
                d = Math.sqrt(Math.pow(utm[0] - last.x, 2) + Math.pow(utm[1] - last.y, 2));
            }

            datos.push({ 
                lat, lng, 
                x: utm[0], y: utm[1], 
                tipo: 'POL', 
                obs: '', 
                dist: d,
                prec: accuracy.toFixed(1)
            });
            actualizar();
        }, err => alert("GPS No disponible: " + err.message), conf);
    }

    function actualizar() {
        localStorage.setItem('syntro_v12_base', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        
        let ptsPol = [];
        let perimetro = 0;

        datos.forEach((p, i) => {
            const colorP = p.tipo === 'POL' ? '#184e77' : '#e67e22';
            const m = L.circleMarker([p.lat, p.lng], { 
                radius: 6, fillColor: colorP, color: '#fff', weight: 2, fillOpacity: 1 
            }).addTo(map).bindTooltip(`V${i+1}`, {permanent: false});
            marcadores.push(m);

            if(p.tipo === 'POL') {
                ptsPol.push([p.lat, p.lng]);
                perimetro += p.dist;
            }

            tbody.innerHTML += `<tr>
                <td><b>${i+1}</b></td>
                <td>
                    <select onchange="cambiar(${i},'tipo',this.value)">
                        <option value="POL" ${p.tipo==='POL'?'selected':''}>POL</option>
                        <option value="PTO" ${p.tipo==='PTO'?'selected':''}>PTO</option>
                    </select>
                </td>
                <td class="utm-col">${p.x.toFixed(2)}</td>
                <td class="utm-col">${p.y.toFixed(2)}</td>
                <td style="font-weight:bold; color:blue">${p.dist.toFixed(2)}</td>
                <td><input type="text" placeholder="Nota..." value="${p.obs}" onchange="cambiar(${i},'obs',this.value)"></td>
                <td onclick="borrar(${i})" style="cursor:pointer; color:red">✖</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = perimetro.toFixed(2);
        
        // Área en Hectáreas usando coordenadas proyectadas (UTM)
        if(ptsPol.length > 2) {
            const areaM2 = turf.area(capaPol.toGeoJSON());
            document.getElementById('area-val').innerText = (areaM2 / 10000).toFixed(4);
        } else {
            document.getElementById('area-val').innerText = "0.0000";
        }
    }

    function cambiar(i, campo, valor) {
        datos[i][campo] = valor;
        // Recalcular distancias dinámicamente si se cambia de TIPO
        let lastX = null, lastY = null;
        datos.forEach((p) => {
            if(p.tipo === 'POL') {
                if(lastX !== null) p.dist = Math.sqrt(Math.pow(p.x - lastX, 2) + Math.pow(p.y - lastY, 2));
                else p.dist = 0;
                lastX = p.x; lastY = p.y;
            } else { p.dist = 0; }
        });
        actualizar();
    }

    function borrar(i) {
        if(confirm(`¿Eliminar Vértice ${i+1}?`)) {
            datos.splice(i, 1);
            actualizar();
        }
    }

    function limpiar() {
        if(confirm("¡ATENCIÓN! Se borrarán todos los puntos. ¿Continuar?")) {
            datos = [];
            actualizar();
        }
    }

    function exportGeo() {
        const features = [];
        // Capa de Puntos
        datos.forEach((p, i) => {
            features.push({
                type: "Feature",
                geometry: { type: "Point", coordinates: [p.lng, p.lat] },
                properties: { VRT: i+1, TIPO: p.tipo, X: p.x, Y: p.y, NOTA: p.obs, PRECISION: p.prec }
            });
        });
        // Capa de Polígono
        const ptsPol = datos.filter(x => x.tipo === 'POL').map(p => [p.lng, p.lat]);
        if(ptsPol.length > 2) {
            ptsPol.push(ptsPol[0]); // Cerrar anillo
            features.push({
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [ptsPol] },
                properties: { NOMBRE: "POLIGONO_CAMPO", AREA_HA: document.getElementById('area-val').innerText }
            });
        }
        const fc = { type: "FeatureCollection", features: features };
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(fc)], {type: 'application/json'}));
        a.download = `SYN_LEVANTAMIENTO.geojson`; a.click();
    }

    function exportCSV() {
        let csv = "VRT,TIPO,ESTE_X,NORTE_Y,LAT,LNG,DISTANCIA_M,OBSERVACION,PRECISION_GPS\n";
        datos.forEach((p, i) => {
            csv += `${i+1},${p.tipo},${p.x.toFixed(3)},${p.y.toFixed(3)},${p.lat},${p.lng},${p.dist.toFixed(2)},"${p.obs}",${p.prec}\n`;
        });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
        a.download = `SYNTRO_PLANILLA.csv`; a.click();
    }

    actualizar();
</script>
</body>
</html>
