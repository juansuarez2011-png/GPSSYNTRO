<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Field Pro V12.2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #map-container { flex: 1; height: 100vh; position: relative; border-right: 2px solid #ccc; }
        #map { height: 100%; width: 100%; background: #333; }

        .panel { width: 580px; background: var(--bg); display: flex; flex-direction: column; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .header { background: var(--s-navy); color: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--s-lime); }
        
        .toolbar { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-gps { grid-column: span 2; background: var(--s-navy); color: white; height: 65px; border: none; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff; transition: 0.2s; }
        .btn-gps:active { box-shadow: inset 2px 2px 5px #000; transform: scale(0.98); }
        
        button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; font-size: 0.75rem; background: var(--bg); color: var(--s-navy); box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 10px; margin-bottom: 5px; }
        .stat-card { background: var(--bg); padding: 10px; border-radius: 10px; text-align: center; box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }
        .stat-card b { font-size: 1.3rem; color: var(--s-navy); display: block; }

        .table-wrap { flex: 1; overflow: auto; margin: 10px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 550px; }
        th { background: #f1f3f5; padding: 10px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #eee; }
        
        .coord-val { font-family: 'Courier New', monospace; font-weight: bold; color: #d32f2f; }
        input[type="text"] { width: 90%; border: 1px solid #ccc; border-radius: 4px; padding: 5px; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 35vh; flex: none; width: 100%; }
            .panel { width: 100%; height: 65vh; }
        }
    </style>
</head>
<body>

<div id="map-container">
    <div id="map"></div>
</div>

<div class="panel">
    <div class="header">
        <div style="font-weight: bold; letter-spacing: 1px;">SYNTRO GPS PRO V12.2 (UTM 19N)</div>
    </div>

    <div class="toolbar">
        <button id="mainBtn" class="btn-gps" onclick="capturar()">📍 CAPTURAR VÉRTICE</button>
        <button onclick="exportGeo()">📥 GEOJSON (GIS)</button>
        <button onclick="exportCSV()">📥 EXCEL (CSV)</button>
        <button style="color:red; grid-column: span 2;" onclick="limpiar()">🗑️ BORRAR TODO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ÁREA (ha)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERÍMETRO (m)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>VRT</th>
                    <th>ESTE (X)</th>
                    <th>NORTE (Y)</th>
                    <th>DIST (m)</th>
                    <th>OBSERVACIÓN</th>
                    <th>ELIM</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuración para Venezuela (Zona 19N)
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    let datos = JSON.parse(localStorage.getItem('syntro_storage')) || [];
    let marcadores = [];

    // Iniciar Mapa
    const map = L.map('map', { zoomControl: false }).setView([10.64, -71.61], 16);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { 
        maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] 
    }).addTo(map);

    const capaPol = L.polygon([], {color: '#d9ed92', weight: 4, fillOpacity: 0.4}).addTo(map);

    function capturar() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "🛰️ BUSCANDO SEÑAL...";
        btn.style.opacity = "0.7";

        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            const utm = proj4("EPSG:4326", utm19N, [lng, lat]);
            
            let d = 0;
            if(datos.length > 0) {
                const last = datos[datos.length-1];
                d = Math.sqrt(Math.pow(utm[0] - last.x, 2) + Math.pow(utm[1] - last.y, 2));
            }

            datos.push({ 
                lat, lng, x: utm[0], y: utm[1], 
                obs: '', dist: d, prec: accuracy.toFixed(1) 
            });
            
            btn.innerText = "📍 CAPTURAR VÉRTICE";
            btn.style.opacity = "1";
            actualizar();
        }, err => {
            alert("Error: " + err.message + ". Verifica que el GPS esté activo.");
            btn.innerText = "📍 CAPTURAR VÉRTICE";
            btn.style.opacity = "1";
        }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function actualizar() {
        localStorage.setItem('syntro_storage', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        let ptsPol = [];
        let perimetro = 0;

        datos.forEach((p, i) => {
            const m = L.circleMarker([p.lat, p.lng], { 
                radius: 6, fillColor: '#184e77', color: '#fff', weight: 2, fillOpacity: 1 
            }).addTo(map).bindTooltip("V"+(i+1));
            marcadores.push(m);
            ptsPol.push([p.lat, p.lng]);
            perimetro += p.dist;

            tbody.innerHTML += `<tr>
                <td><b>${i+1}</b></td>
                <td class="coord-val">${p.x.toFixed(2)}</td>
                <td class="coord-val">${p.y.toFixed(2)}</td>
                <td style="font-weight:bold; color:#1e6091">${p.dist.toFixed(2)}</td>
                <td><input type="text" value="${p.obs}" onchange="cambiar(${i},this.value)" placeholder="..."></td>
                <td onclick="borrar(${i})" style="color:red; cursor:pointer">✖</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = perimetro.toFixed(2);
        if(ptsPol.length > 2) {
            const areaM2 = turf.area(capaPol.toGeoJSON());
            document.getElementById('area-val').innerText = (areaM2 / 10000).toFixed(4);
        }
    }

    function cambiar(i, v) { datos[i].obs = v; localStorage.setItem('syntro_storage', JSON.stringify(datos)); }
    
    function borrar(i) { if(confirm("¿Eliminar?")) { datos.splice(i,1); actualizar(); } }

    function limpiar() { if(confirm("¿Borrar todo el levantamiento?")) { datos = []; actualizar(); } }

    function exportGeo() {
        const fc = { type: "FeatureCollection", features: datos.map((p, i) => ({
            type: "Feature", geometry: { type: "Point", coordinates: [p.lng, p.lat] },
            properties: { VRT: i+1, X: p.x, Y: p.y, NOTA: p.obs }
        }))};
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(fc)], {type:'application/json'}));
        a.download = "LEVANTAMIENTO.geojson"; a.click();
    }

    function exportCSV() {
        let csv = "ID,ESTE_X,NORTE_Y,DISTANCIA,NOTA\n";
        datos.forEach((p, i) => { csv += `${i+1},${p.x},${p.y},${p.dist},"${p.obs}"\n`; });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = "REPORTE_UTM.csv"; a.click();
    }

    actualizar();
</script>
</body>
</html>
