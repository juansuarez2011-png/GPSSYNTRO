<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geo GPS Syntro Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GPSSyntro">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#184e77">

    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <script src="proj4.js"></script>
    <script src="turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --s-blue: #1e6091; --bg: #f4f7f6; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; display: flex; height: 100vh; flex-direction: row; 
            background: var(--bg); overflow: hidden; 
        }

        #map { flex: 1; z-index: 1; height: 100%; }

        .panel { 
            width: 400px; background: white; z-index: 10; display: flex; 
            flex-direction: column; box-shadow: -2px 0 15px rgba(0,0,0,0.1); 
            border-left: 3px solid var(--s-blue); transition: all 0.3s ease;
        }

        .header { 
            background: var(--s-navy); color: white; padding: 12px; 
            text-align: center; border-bottom: 5px solid var(--s-lime);
            flex-shrink: 0;
        }
        .header img { height: 35px; object-fit: contain; }

        .content { 
            padding: 15px; flex: 1; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 12px; 
        }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .data-card { 
            background: #fff; border: 1px solid #e0e0e0; padding: 10px; 
            border-radius: 8px; text-align: center; border-left: 4px solid var(--s-blue); 
        }
        .data-card label { font-size: 0.6rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; display: block; }
        .data-card span { font-size: 1.1rem; font-weight: 700; color: var(--s-navy); }

        .btn { 
            min-height: 48px; padding: 10px; border: none; border-radius: 8px; 
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 8px; transition: background 0.2s; 
        }

        .btn-capture { background: var(--s-navy); color: white; width: 100%; box-shadow: 0 4px #0d2b42; }
        .btn-capture:active { transform: translateY(2px); box-shadow: 0 2px #0d2b42; }
        .btn-import { background: var(--s-lime); color: var(--s-navy); }

        .table-container { 
            border: 1px solid #e0e0e0; border-radius: 8px; 
            overflow: hidden; background: white;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: #f8f9fa; padding: 12px 8px; color: #7f8c8d; border-bottom: 2px solid #ddd; }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #f1f3f4; }

        .v-marker { 
            background: var(--s-navy); color: white; border-radius: 50%; 
            width: 24px; height: 24px; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: bold; 
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* DISEÑO PARA MÓVILES (Vertical) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #map { height: 60%; width: 100%; }
            .panel { 
                width: 100%; height: 40%; border-left: none; 
                border-top: 4px solid var(--s-blue); 
            }
            .header { padding: 8px; }
            .header img { height: 30px; }
            .content { padding: 10px; gap: 8px; }
            .btn { min-height: 44px; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="header">
        <img src="logo.png" alt="Syntro Academy">
        <div style="font-size: 0.65rem; letter-spacing: 1px; font-weight: 300; margin-top:2px;">GPS INGENIERÍA</div>
    </div>

    <div class="content">
        <input type="file" id="inGeoJSON" style="display:none" accept=".geojson" onchange="importarMapaBase(event)">
        <button class="btn btn-import" onclick="document.getElementById('inGeoJSON').click()">📂 CARGAR MAPA BASE</button>
        
        <div class="dashboard">
            <div class="data-card"><label>Hectáreas</label><span id="res-ha">0.0000</span></div>
            <div class="data-card"><label>Perímetro (m)</label><span id="res-pm">0.00</span></div>
        </div>

        <button class="btn btn-capture" onclick="capturarVértice()">📍 FIJAR VÉRTICE ACTUAL</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>VRT</th><th>X (UTM)</th><th>Y (UTM)</th><th>ACC</th></tr>
                </thead>
                <tbody id="tabla-atributos"></tbody>
            </table>
        </div>

        <div class="group-export-btns" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:5px; padding-bottom: 20px;">
            <button class="btn" style="background:#fff; border:1px solid #ddd;" onclick="exportarCSV()">CSV</button>
            <button class="btn" style="background:#fff; border:1px solid #ddd;" onclick="exportarPoligonoGeoJSON()">GEOJSON</button>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log(err));
    }

    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    const wgs84 = "EPSG:4326";
    
    // Configuración para mejor respuesta táctil en móviles
    const map = L.map('map', { 
        tap: true, 
        zoomControl: false,
        touchZoom: true
    }).setView([10.6447, -71.6106], 15);

    L.control.zoom({ position: 'topleft' }).addTo(map);
    L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { 
        maxZoom: 22, 
        subdomains:['mt0','mt1','mt2','mt3'] 
    }).addTo(map);

    let verticesData = []; 
    let marcadoresCapas = [];
    let poligonoLevantamiento = L.polygon([], {color: '#d9ed92', weight: 3, fillOpacity: 0.4}).addTo(map);
    let mapaBaseCapa = L.geoJSON(null, { style: { color: '#3498db', weight: 2, dashArray: '5,5' } }).addTo(map);

    map.on('click', e => agregarPunto(e.latlng.lat, e.latlng.lng));

    function capturarVértice() {
        if (!navigator.geolocation) return alert("GPS no disponible.");
        const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            map.setView([lat, lng], 18);
            agregarPunto(lat, lng);
        }, err => alert("GPS Error: Asegúrate de dar permisos de ubicación."), options);
    }

    function agregarPunto(lat, lng) {
        const utm = proj4(wgs84, utm19N, [lng, lat]);
        let dist = 0;
        if (verticesData.length > 0) {
            const last = verticesData[verticesData.length - 1];
            dist = map.distance([last.lat, last.lng], [lat, lng]);
        }
        verticesData.push({ id: Date.now(), lat, lng, x: utm[0], y: utm[1], dist: dist });
        renderizarLevantamiento();
    }

    function eliminarVértice(id) {
        verticesData = verticesData.filter(v => v.id !== id);
        verticesData.forEach((v, i) => {
            v.dist = (i === 0) ? 0 : map.distance([verticesData[i-1].lat, verticesData[i-1].lng], [v.lat, v.lng]);
        });
        renderizarLevantamiento();
    }

    function renderizarLevantamiento() {
        marcadoresCapas.forEach(m => map.removeLayer(m));
        marcadoresCapas = [];
        const tbody = document.getElementById('tabla-atributos');
        tbody.innerHTML = "";
        let perimetroTotal = 0;

        poligonoLevantamiento.setLatLngs(verticesData.map(v => [v.lat, v.lng]));

        verticesData.forEach((v, i) => {
            const m = L.marker([v.lat, v.lng], {
                icon: L.divIcon({ className: 'v-marker', html: `B${i+1}` })
            }).addTo(map);
            marcadoresCapas.push(m);
            perimetroTotal += v.dist;
            
            tbody.innerHTML += `
                <tr>
                    <td><b>B${i+1}</b></td>
                    <td>${v.x.toFixed(0)}</td>
                    <td>${v.y.toFixed(0)}</td>
                    <td><button onclick="eliminarVértice(${v.id})" style="color:#e74c3c; border:none; background:none; font-size:1.4rem; padding:5px;">×</button></td>
                </tr>`;
        });

        document.getElementById('res-pm').innerText = perimetroTotal.toFixed(2);
        if (verticesData.length > 2) {
            const area = turf.area(poligonoLevantamiento.toGeoJSON());
            document.getElementById('res-ha').innerText = (area / 10000).toFixed(4);
        }
    }

    function importarMapaBase(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            mapaBaseCapa.clearLayers();
            mapaBaseCapa.addData(JSON.parse(ev.target.result));
            map.fitBounds(mapaBaseCapa.getBounds());
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportarCSV() {
        let csv = "PUNTO,ESTE_X,NORTE_Y,DIST_M,LAT,LNG\n";
        verticesData.forEach((v, i) => csv += `B${i+1},${v.x},${v.y},${v.dist},${v.lat},${v.lng}\n`);
        descargar(new Blob([csv], {type: 'text/csv'}), "Levantamiento_Syntro.csv");
    }

    function exportarPoligonoGeoJSON() {
        if (verticesData.length < 3) return alert("Mínimo 3 puntos para generar un polígono.");
        descargar(new Blob([JSON.stringify(poligonoLevantamiento.toGeoJSON())], {type: 'application/json'}), "Poligono_Syntro.geojson");
    }

    function descargar(blob, n) {
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = n; 
        a.click();
    }
</script>
</body>
</html>
