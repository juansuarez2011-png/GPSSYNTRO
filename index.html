<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Field Pro V12.7</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* Contenedor del Mapa */
        #map-container { flex: 1; height: 100vh; position: relative; transition: all 0.3s ease; border-right: 2px solid #ccc; display: block; }
        #map { height: 100%; width: 100%; background: #222; }

        /* ESTADO OCULTO - REFORZADO */
        #map-container.map-hidden { display: none !important; }

        /* Panel Lateral */
        .panel { width: 600px; background: var(--bg); display: flex; flex-direction: column; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: all 0.3s ease; }
        .panel.panel-full { width: 100% !important; } /* Ocupa todo cuando el mapa se oculta */
        
        .header { 
            background: var(--s-navy); color: white; padding: 12px 15px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--s-lime); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .header img { height: 40px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }

        .toolbar { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-gps { 
            grid-column: span 2; background: var(--s-navy); color: white; height: 70px; 
            border: none; font-size: 1.2rem; font-weight: bold; border-radius: 15px; cursor: pointer; 
            box-shadow: 0 6px 0 #0d2b42, 0 12px 20px rgba(0,0,0,0.2); transition: 0.1s;
        }
        .btn-gps:active { transform: translateY(3px); box-shadow: 0 2px 0 #0d2b42; }
        
        button.action { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; background: white; color: var(--s-navy); cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }

        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #ddd; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.05); }
        .stat-card small { font-size: 0.7rem; color: #666; display: block; text-transform: uppercase; }
        .stat-card b { font-size: 1.2rem; color: var(--s-navy); }

        /* TABLA ANCHA Y LEGIBLE */
        .table-wrap { flex: 1; overflow-x: auto; overflow-y: auto; margin: 0 15px 15px 15px; background: white; border-radius: 15px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px; }
        th { background: #f8f9fa; padding: 15px 10px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--s-lime); color: var(--s-navy); }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; }
        
        .coord-val { font-family: 'Courier New', monospace; font-weight: bold; color: #c0392b; }
        .tipo-select { padding: 5px; border-radius: 5px; font-weight: bold; color: var(--s-navy); border: 1px solid #ccc; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 40vh; width: 100%; border-right: none; border-bottom: 2px solid #ccc; }
            .panel { width: 100%; height: 60vh; }
            #map-container.map-hidden { display: none !important; }
            .panel.panel-full { height: 100vh !important; }
        }
    </style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<div class="panel" id="main-panel">
    <div class="header">
        <img src="logo.png" alt="Syntro">
        <span style="font-weight: bold;">V12.7 PRO</span>
        <button class="action" onclick="toggleVista()" style="background:var(--s-lime); border:none; padding:8px 15px; border-radius:10px; color:var(--s-navy); font-weight:bold;">🗺️ MAPA ON/OFF</button>
    </div>
    
    <div class="toolbar">
        <button id="mainBtn" class="btn-gps" onclick="capturar()">📍 CAPTURAR VÉRTICE</button>
        <button class="action" onclick="exportGeo()">📥 GEOJSON</button>
        <button class="action" onclick="exportCSV()">📥 EXCEL (CSV)</button>
        <button style="color:#e74c3c; grid-column: span 2; font-size: 0.85rem; background: none; border: none; margin-top: 5px; cursor:pointer; font-weight:bold;" onclick="limpiar()">🗑️ BORRAR TODO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ZONA UTM</small><b id="utm-zona">-</b></div>
        <div class="stat-card"><small>ÁREA (HA)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERIM (M)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>TIPO</th>
                    <th>ESTE (X)</th>
                    <th>NORTE (Y)</th>
                    <th>DIST (m)</th>
                    <th>OBSERVACIÓN</th>
                    <th>ELIM</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('syntro_v12_7')) || [];
    let marcadores = [];
    let areaHectareas = 0;
    let perimetroMetros = 0;
    
    const map = L.map('map', { zoomControl: false }).setView([10.5, -67], 6);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const capaPol = L.polygon([], {color: '#d9ed92', weight: 4, fillOpacity: 0.3}).addTo(map);

    function toggleVista() {
        const mapCont = document.getElementById('map-container');
        const panel = document.getElementById('main-panel');
        
        mapCont.classList.toggle('map-hidden');
        panel.classList.toggle('panel-full');
        
        // Refrescar mapa si se vuelve a mostrar
        setTimeout(() => map.invalidateSize(), 350);
    }

    function getUTMData(lat, lng) {
        const zone = Math.floor((lng + 180) / 6) + 1;
        const def = `+proj=utm +zone=${zone} +ellps=WGS84 +datum=WGS84 +units=m +no_defs`;
        const coords = proj4("EPSG:4326", def, [lng, lat]);
        return { x: coords[0], y: coords[1], zone: zone };
    }

    function capturar() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "🛰️ BUSCANDO SEÑAL...";
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            const utm = getUTMData(lat, lng);
            datos.push({ lat, lng, x: utm.x, y: utm.y, zone: utm.zone, tipo: 'POL', dist: 0, obs: '' });
            btn.innerText = "📍 CAPTURAR VÉRTICE";
            actualizar();
            map.setView([lat, lng], 19);
        }, err => {
            alert("Error de GPS: Asegúrate de estar a cielo abierto.");
            btn.innerText = "📍 CAPTURAR VÉRTICE";
        }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
    }

    function actualizar() {
        localStorage.setItem('syntro_v12_7', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        
        let ptsPol = [];
        let totalP = 0;
        let lastX = null, lastY = null;

        datos.forEach((p, i) => {
            if(p.tipo === 'POL') {
                if(lastX !== null) p.dist = Math.sqrt(Math.pow(p.x - lastX, 2) + Math.pow(p.y - lastY, 2));
                totalP += p.dist;
                lastX = p.x; lastY = p.y;
                ptsPol.push([p.lat, p.lng]);
            }
            const color = p.tipo === 'POL' ? '#184e77' : '#e67e22';
            const m = L.circleMarker([p.lat, p.lng], { radius: 7, color: 'white', weight: 2, fillColor: color, fillOpacity: 1 }).addTo(map);
            marcadores.push(m);
            if(i === 0) document.getElementById('utm-zona').innerText = p.zone + "N";

            tbody.innerHTML += `<tr>
                <td><b>${i+1}</b></td>
                <td>
                    <select class="tipo-select" onchange="cambiarTipo(${i}, this.value)">
                        <option value="POL" ${p.tipo==='POL'?'selected':''}>POL</option>
                        <option value="PTS" ${p.tipo==='PTS'?'selected':''}>PTS</option>
                    </select>
                </td>
                <td class="coord-val">${p.x.toFixed(2)}</td>
                <td class="coord-val">${p.y.toFixed(2)}</td>
                <td style="color:blue; font-weight:bold">${p.dist.toFixed(2)}</td>
                <td><input type="text" value="${p.obs}" onchange="cambiarObs(${i}, this.value)" style="width:100%; padding:5px;"></td>
                <td onclick="borrar(${i})" style="color:red; cursor:pointer; font-weight:bold;">×</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        perimetroMetros = totalP;
        document.getElementById('perim-val').innerText = perimetroMetros.toFixed(2);
        if(ptsPol.length > 2) {
            const area = turf.area(capaPol.toGeoJSON());
            areaHectareas = area / 10000;
            document.getElementById('area-val').innerText = areaHectareas.toFixed(4);
        } else {
            document.getElementById('area-val').innerText = "0.0000";
        }
    }

    function cambiarTipo(i, v) { datos[i].tipo = v; actualizar(); }
    function cambiarObs(i, v) { datos[i].obs = v; localStorage.setItem('syntro_v12_7', JSON.stringify(datos)); }
    function borrar(i) { if(confirm("¿Eliminar?")) { datos.splice(i,1); actualizar(); } }
    function limpiar() { if(confirm("¿Borrar todo?")) { datos = []; actualizar(); } }

    function exportGeo() {
        if(datos.length === 0) return;
        const features = datos.map((p, i) => ({
            type: "Feature",
            geometry: { type: "Point", coordinates: [p.lng, p.lat] },
            properties: { ID: i+1, TIPO: p.tipo, X: p.x, Y: p.y, OBS: p.obs }
        }));
        const polPts = datos.filter(p => p.tipo === 'POL').map(p => [p.lng, p.lat]);
        if(polPts.length > 2) {
            polPts.push(polPts[0]);
            features.push({
                type: "Feature",
                geometry: { type: "Polygon", coordinates: [polPts] },
                properties: { AREA_HA: areaHectareas.toFixed(4), PERIM_M: perimetroMetros.toFixed(2) }
            });
        }
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({ type: "FeatureCollection", features })], {type: 'application/json'}));
        a.download = `SYN_LEV_${Date.now()}.geojson`; a.click();
    }

    function exportCSV() {
        let csv = "ID,TIPO,X_ESTE,Y_NORTE,DIST,OBS\n";
        datos.forEach((p, i) => { csv += `${i+1},${p.tipo},${p.x},${p.y},${p.dist},"${p.obs}"\n`; });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
        a.download = `SYN_LEV_${Date.now()}.csv`; a.click();
    }

    actualizar();
</script>
</body>
</html>
