<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Field Pro V12</title>
    
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <script src="proj4.js"></script>
    <script src="turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* Contenedor Mapa */
        #map-container { flex: 1; height: 100vh; position: relative; border-right: 2px solid #ccc; transition: all 0.3s ease; }
        #map { height: 100%; width: 100%; background: #333; }

        /* Botón Flotante para abrir/cerrar mapa */
        .btn-toggle-map {
            position: absolute; top: 10px; left: 10px; z-index: 1100;
            padding: 10px 15px; background: white; border: 2px solid var(--s-navy);
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        #map-container.map-hidden { flex: 0; min-width: 0; width: 0; overflow: hidden; border: none; }

        /* Panel Lateral (Estilo 3D/Neumórfico) */
        .panel { 
            width: 450px; background: var(--bg); display: flex; flex-direction: column; 
            z-index: 10; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }

        .header { background: var(--s-navy); color: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--s-lime); }
        .header img { height: 35px; margin-bottom: 5px; }

        .toolbar { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-gps { 
            grid-column: span 2; background: var(--s-navy); color: white; height: 55px; 
            border: none; font-size: 1rem; font-weight: bold; border-radius: 12px; 
            box-shadow: 4px 4px 8px rgba(0,0,0,0.3);
        }
        
        button { 
            padding: 10px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
            background: var(--bg); color: var(--s-navy);
            box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff;
        }
        button:active { box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px; }
        .stat-card { background: var(--bg); padding: 10px; border-radius: 12px; text-align: center; box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }
        .stat-card b { font-size: 1.1rem; color: var(--s-navy); display: block; }

        .table-wrap { flex: 1; overflow: auto; margin: 15px; background: white; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { background: #f1f3f5; padding: 10px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; }
        
        .utm-txt { font-weight: bold; font-family: monospace; color: #444; }
        .prec-badge { font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; background: #e0e7ff; color: #1e40af; }

        /* Ajustes para Móvil */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 40vh; flex: none; width: 100%; }
            #map-container.map-hidden { height: 0; }
            .panel { width: 100%; height: 60vh; }
            .panel.full-screen { height: 100vh; }
        }
    </style>
</head>
<body>

<div id="map-container">
    <button class="btn-toggle-map" onclick="toggleMapa()" id="mapBtn">🗺️ OCULTAR MAPA</button>
    <div id="map"></div>
</div>

<div class="panel" id="sidePanel">
    <div class="header">
        <img src="logo.png" alt="SYNTRO" onerror="this.style.display='none'">
        <div style="font-weight: bold; font-size: 0.9rem;">GPS FIELD PRO V12</div>
    </div>

    <div class="toolbar">
        <button class="btn-gps" onclick="capturar()">📍 FIJAR VÉRTICE (GPS)</button>
        
        <button id="backupBtn" style="display:none; background: var(--s-lime);" onclick="toggleMapa()">🗺️ MOSTRAR MAPA</button>
        <button onclick="document.getElementById('fileIn').click()">📂 IMPORTAR BASE</button>
        <input type="file" id="fileIn" style="display:none" accept=".geojson" onchange="importarBase(event)">
        
        <button onclick="exportGeo()">📥 EXPORTAR GEOJSON</button>
        <button onclick="exportCSV()">📥 EXPORTAR CSV</button>
        <button style="color:red; grid-column: span 2;" onclick="limpiar()">🗑️ BORRAR TODO EL LEVANTAMIENTO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ÁREA (ha)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERÍMETRO (m)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>VRT</th>
                    <th>UTM X / Y</th>
                    <th>DIST(m)</th>
                    <th>OBS (PREC)</th>
                    <th>ELIM</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    // Configuración UTM Zona 19N (Venezuela)
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    let datos = JSON.parse(localStorage.getItem('syntro_v12_base')) || [];
    let marcadores = [];
    let capaBase = null;

    // Inicializar Mapa
    const map = L.map('map', { zoomControl: false }).setView([10.64, -71.61], 16);
    
    // Capa de satélite (funciona con caché si se visitó antes)
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    const capaPol = L.polygon([], {color: '#d9ed92', weight: 3, fillOpacity: 0.3}).addTo(map);

    function toggleMapa() {
        const container = document.getElementById('map-container');
        const panel = document.getElementById('sidePanel');
        const backupBtn = document.getElementById('backupBtn');
        
        container.classList.toggle('map-hidden');
        
        if(container.classList.contains('map-hidden')) {
            backupBtn.style.display = "block";
            if(window.innerWidth <= 850) panel.classList.add('full-screen');
        } else {
            backupBtn.style.display = "none";
            panel.classList.remove('full-screen');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
    }

    function capturar() {
        // OPCIONES DE ALTA PRECISIÓN PARA CAMPO
        const gpsOptions = {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;

            // FILTRO DE ERROR: Si el GPS marca más de 10m de error, no lo toma.
            if (accuracy > 10) {
                alert(`Mala señal: Precisión de ${accuracy.toFixed(1)}m. \nEspera unos segundos a que el GPS se estabilice.`);
                return;
            }

            const utm = proj4("EPSG:4326", utm19N, [lng, lat]);
            let d = 0;
            
            if(datos.length > 0) {
                const last = datos[datos.length - 1];
                d = map.distance([last.lat, last.lng], [lat, lng]);
            }

            datos.push({ 
                lat, lng, 
                x: utm[0], y: utm[1], 
                tipo: 'POL', 
                obs: `Prec: ${accuracy.toFixed(1)}m`, 
                dist: d 
            });

            actualizar();
            map.panTo([lat, lng]);

        }, err => {
            alert("Error: Activa el GPS en modo 'Alta Precisión'.");
        }, gpsOptions);
    }

    function actualizar() {
        localStorage.setItem('syntro_v12_base', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        let ptsPol = [];
        let totalP = 0;

        datos.forEach((p, i) => {
            const m = L.circleMarker([p.lat, p.lng], { 
                radius: 6, fillColor: '#184e77', color: '#fff', weight: 2, fillOpacity: 1 
            }).addTo(map).bindTooltip(`V${i+1}`, {permanent:true});
            
            marcadores.push(m);
            ptsPol.push([p.lat, p.lng]);
            totalP += p.dist;

            tbody.innerHTML += `<tr>
                <td><b>${i+1}</b></td>
                <td class="utm-txt">${p.x.toFixed(0)} E<br>${p.y.toFixed(0)} N</td>
                <td style="color:#1e6091; font-weight:bold">${p.dist.toFixed(1)}</td>
                <td><span class="prec-badge">${p.obs}</span></td>
                <td onclick="borrar(${i})" style="cursor:pointer">🗑️</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = totalP.toFixed(2);
        
        if(ptsPol.length > 2) {
            const areaM2 = turf.area(capaPol.toGeoJSON());
            document.getElementById('area-val').innerText = (areaM2 / 10000).toFixed(4);
        }
    }

    function borrar(i) {
        if(confirm("¿Eliminar este vértice?")) {
            datos.splice(i, 1);
            // Recalcular distancias tras borrar
            for(let j=0; j<datos.length; j++) {
                if(j===0) datos[j].dist = 0;
                else datos[j].dist = map.distance([datos[j-1].lat, datos[j-1].lng], [datos[j].lat, datos[j].lng]);
            }
            actualizar();
        }
    }

    function limpiar() {
        if(confirm("¿Seguro que desea borrar todo el trabajo actual?")) {
            datos = [];
            actualizar();
        }
    }

    function importarBase(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const geoData = JSON.parse(ev.target.result);
            if(capaBase) map.removeLayer(capaBase);
            capaBase = L.geoJSON(geoData, {style: { color: '#3b82f6', weight: 2, dashArray: '5,5', fillOpacity: 0 }}).addTo(map);
            map.fitBounds(capaBase.getBounds());
        };
        reader.readAsText(e.target.files[0]);
    }

    function exportGeo() {
        const fc = { type: "FeatureCollection", features: datos.map((p, i) => ({ 
            type: "Feature", 
            geometry: { type: "Point", coordinates: [p.lng, p.lat] }, 
            properties: { VRT: i+1, UTM_X: p.x, UTM_Y: p.y, DIST: p.dist, INFO: p.obs } 
        })) };
        const blob = new Blob([JSON.stringify(fc)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `SYN_FIELD_${Date.now()}.geojson`; a.click();
    }

    function exportCSV() {
        let csv = "VRT,UTM_X,UTM_Y,DISTANCIA_M,PRECISION\n";
        datos.forEach((p, i) => csv += `${i+1},${p.x},${p.y},${p.dist},${p.obs}\n`);
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `SYN_DATA.csv`; a.click();
    }

    actualizar();
</script>

</body>
</html>
