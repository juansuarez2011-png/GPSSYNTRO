<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geo GPS Syntro Pro</title>
    
    <link rel="icon" type="image/png" href="icono.png?v=3">
    <link rel="apple-touch-icon" href="icono.png?v=3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#184e77">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --s-blue: #1e6091; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; flex-direction: row; background: var(--bg); overflow: hidden; }
        
        #map { flex: 1; height: 100%; }

        .panel { 
            width: 400px; background: white; display: flex; flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.1); border-left: 3px solid var(--s-blue);
            position: relative; height: 100vh;
        }

        .header { background: var(--s-navy); color: white; padding: 8px; text-align: center; border-bottom: 4px solid var(--s-lime); }
        .header img { height: 35px; }

        /* Contenedor de scroll limitado para que no empuje los botones */
        .content { 
            flex: 1; overflow-y: auto; padding: 12px; 
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 75px; /* Espacio obligatorio para los botones */
        }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .data-card { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 8px; text-align: center; border-left: 4px solid var(--s-blue); }
        .data-card label { font-size: 0.6rem; color: #7f8c8d; display: block; }
        .data-card span { font-size: 1rem; font-weight: bold; color: var(--s-navy); }

        .btn { min-height: 44px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-capture { background: var(--s-navy); color: white; width: 100%; margin-bottom: 5px; }
        
        .table-container { border: 1px solid #eee; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; min-width: 400px; }
        th { background: #f8f9fa; padding: 10px; border-bottom: 1px solid #ddd; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }

        /* PIE DE PÁGINA FIJO (NUNCA SE MUEVE) */
        .footer-fixed {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70px;
            background: #fff; border-top: 2px solid var(--s-lime);
            display: grid; grid-template-columns: 1fr 1fr 50px; gap: 8px; padding: 10px;
            z-index: 2000;
        }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map { height: 40%; width: 100%; }
            .panel { width: 100%; height: 60%; border-left: none; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <div class="header">
        <img src="logo.png" alt="Syntro">
        <div style="font-size: 0.5rem; letter-spacing: 1px;">GPS INGENIERÍA</div>
    </div>

    <div class="content">
        <div class="dashboard">
            <div class="data-card"><label>HECTÁREAS</label><span id="res-ha">0.0000</span></div>
            <div class="data-card"><label>PERÍMETRO (M)</label><span id="res-pm">0.00</span></div>
        </div>

        <button class="btn btn-capture" onclick="capturarVértice()">📍 FIJAR VÉRTICE ACTUAL</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>VRT</th><th>X (ESTE)</th><th>Y (NORTE)</th><th>DIST(m)</th><th>ACC</th></tr>
                </thead>
                <tbody id="tabla-atributos"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-fixed">
        <button class="btn" style="background:#eee;" onclick="exportarCSV()">CSV</button>
        <button class="btn" style="background:#eee;" onclick="exportarGeoJSON()">GEOJSON</button>
        <button class="btn" style="background:#f2dede; color:red;" onclick="limpiarTodo()">🗑️</button>
    </div>
</div>

<script>
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    const wgs84 = "EPSG:4326";
    let verticesData = JSON.parse(localStorage.getItem('syntro_data')) || [];

    const map = L.map('map', { zoomControl: false }).setView([10.64, -71.61], 15);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);
    let poly = L.polygon([], {color: '#d9ed92', weight: 3}).addTo(map);

    function capturarVértice() {
        navigator.geolocation.getCurrentPosition(p => {
            const { latitude: lat, longitude: lng } = p.coords;
            const utm = proj4(wgs84, utm19N, [lng, lat]);
            verticesData.push({ lat, lng, x: utm[0], y: utm[1], dist: 0 });
            actualizar();
        }, null, { enableHighAccuracy: true });
    }

    function actualizar() {
        localStorage.setItem('syntro_data', JSON.stringify(verticesData));
        const tbody = document.getElementById('tabla-atributos');
        tbody.innerHTML = "";
        let pts = [], pm = 0;

        verticesData.forEach((v, i) => {
            if (pts.length > 0) {
                v.dist = map.distance(pts[pts.length - 1], [v.lat, v.lng]);
                pm += v.dist;
            }
            pts.push([v.lat, v.lng]);
            tbody.innerHTML += `<tr><td>V${i+1}</td><td>${v.x.toFixed(0)}</td><td>${v.y.toFixed(0)}</td><td>${v.dist.toFixed(1)}</td><td onclick="borrar(${i})">❌</td></tr>`;
        });

        poly.setLatLngs(pts);
        document.getElementById('res-pm').innerText = pm.toFixed(2);
        if (pts.length > 2) {
            const area = turf.area(poly.toGeoJSON());
            document.getElementById('res-ha').innerText = (area / 10000).toFixed(4);
        }
    }

    function borrar(i) { verticesData.splice(i, 1); actualizar(); }
    function limpiarTodo() { if(confirm("¿Borrar todo?")) { verticesData = []; actualizar(); } }
    function exportarCSV() {
        let c = "VRT,X,Y,DIST\n";
        verticesData.forEach((v, i) => c += `V${i+1},${v.x},${v.y},${v.dist}\n`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([c], {type:'text/csv'})); a.download = "Syntro.csv"; a.click();
    }
    function exportarGeoJSON() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(poly.toGeoJSON())], {type:'application/json'})); a.download = "Poligono.geojson"; a.click();
    }
    actualizar();
</script>
</body>
</html>
