<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Pro - Venezuela Universal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        #map-container { flex: 1; height: 100vh; position: relative; }
        #map { height: 100%; width: 100%; }
        .panel { width: 600px; background: var(--bg); display: flex; flex-direction: column; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .header { background: var(--s-navy); color: white; padding: 12px; text-align: center; border-bottom: 4px solid var(--s-lime); font-weight: bold; }
        .toolbar { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-gps { grid-column: span 2; background: var(--s-navy); color: white; height: 65px; border: none; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 10px; margin-bottom: 5px; }
        .stat-card { background: white; padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #ccc; }
        .stat-card b { color: var(--s-navy); display: block; font-size: 1rem; }
        .table-wrap { flex: 1; overflow: auto; margin: 10px; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 550px; }
        th { background: #f1f3f5; padding: 10px; position: sticky; top: 0; }
        td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; }
        .coord { font-family: monospace; font-weight: bold; color: #d32f2f; }
        @media (max-width: 850px) { body { flex-direction: column; } .panel { width: 100%; height: 65vh; } #map-container { height: 35vh; } }
    </style>
</head>
<body>

<div id="map-container"><div id="map"></div></div>

<div class="panel">
    <div class="header">SYNTRO GPS FIELD PRO - V12.3 UNIVERSAL</div>
    <div class="toolbar">
        <button id="btnMain" class="btn-gps" onclick="capturar()">📍 CAPTURAR VÉRTICE</button>
        <button onclick="exportGeo()">📥 GEOJSON (GIS)</button>
        <button onclick="exportCSV()">📥 EXCEL (CSV)</button>
        <button style="color:red; grid-column: span 2;" onclick="limpiar()">🗑️ BORRAR LEVANTAMIENTO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ZONA UTM</small><b id="utm-zona">-</b></div>
        <div class="stat-card"><small>ÁREA (ha)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERÍM (m)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>VRT</th>
                    <th>ESTE (X)</th>
                    <th>NORTE (Y)</th>
                    <th>DIST (m)</th>
                    <th>OBSERVACIÓN</th>
                    <th>DEL</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    let datos = JSON.parse(localStorage.getItem('syntro_universal')) || [];
    let marcadores = [];
    const map = L.map('map', { zoomControl: false }).setView([10.5, -66.9], 6);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    const capaPol = L.polygon([], {color: '#d9ed92', weight: 3, fillOpacity: 0.4}).addTo(map);

    // FUNCIÓN CLAVE: Determina la zona UTM automáticamente
    function getUTM(lat, lng) {
        const zone = Math.floor((lng + 180) / 6) + 1;
        const def = `+proj=utm +zone=${zone} +ellps=WGS84 +datum=WGS84 +units=m +no_defs`;
        const coords = proj4("EPSG:4326", def, [lng, lat]);
        return { x: coords[0], y: coords[1], zone: zone };
    }

    function capturar() {
        const btn = document.getElementById('btnMain');
        btn.innerText = "🛰️ SINCRONIZANDO...";
        
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng, accuracy } = pos.coords;
            const utm = getUTM(lat, lng);
            
            let d = 0;
            if(datos.length > 0) {
                const last = datos[datos.length-1];
                // Distancia euclidiana sobre el plano UTM (Metros reales)
                d = Math.sqrt(Math.pow(utm.x - last.x, 2) + Math.pow(utm.y - last.y, 2));
            }

            datos.push({ lat, lng, x: utm.x, y: utm.y, zone: utm.zone, dist: d, obs: '' });
            btn.innerText = "📍 CAPTURAR VÉRTICE";
            actualizar();
        }, err => alert("GPS Error: " + err.message), { enableHighAccuracy: true });
    }

    function actualizar() {
        localStorage.setItem('syntro_universal', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        let ptsPol = [];
        let totalDist = 0;

        datos.forEach((p, i) => {
            const m = L.circleMarker([p.lat, p.lng], { radius: 5, color: 'white', weight: 2, fillColor: '#184e77', fillOpacity: 1 }).addTo(map);
            marcadores.push(m);
            ptsPol.push([p.lat, p.lng]);
            totalDist += p.dist;
            
            if(i === 0) document.getElementById('utm-zona').innerText = p.zone + "N";

            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td class="coord">${p.x.toFixed(2)}</td>
                <td class="coord">${p.y.toFixed(2)}</td>
                <td style="font-weight:bold; color:blue">${p.dist.toFixed(2)}</td>
                <td><input type="text" value="${p.obs}" onchange="cambiar(${i}, this.value)"></td>
                <td onclick="borrar(${i})" style="color:red">✖</td>
            </tr>`;
        });

        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = totalDist.toFixed(2);
        if(ptsPol.length > 2) {
            const area = turf.area(capaPol.toGeoJSON());
            document.getElementById('area-val').innerText = (area / 10000).toFixed(4);
        }
    }

    function cambiar(i, v) { datos[i].obs = v; localStorage.setItem('syntro_universal', JSON.stringify(datos)); }
    function borrar(i) { if(confirm("¿Borrar?")) { datos.splice(i,1); actualizar(); } }
    function limpiar() { if(confirm("¿Limpiar todo?")) { datos = []; actualizar(); } }

    function exportGeo() {
        const features = datos.map((p, i) => ({
            type: "Feature", geometry: { type: "Point", coordinates: [p.lng, p.lat] },
            properties: { VRT: i+1, X: p.x, Y: p.y, OBS: p.obs }
        }));
        
        if(datos.length > 2) {
            const polCoords = [...datos.map(p => [p.lng, p.lat]), [datos[0].lng, datos[0].lat]];
            features.push({
                type: "Feature", geometry: { type: "Polygon", coordinates: [polCoords] },
                properties: { TIPO: "POLIGONO_AREA", AREA_HA: document.getElementById('area-val').innerText }
            });
        }

        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify({type: "FeatureCollection", features})], {type: 'application/json'}));
        a.download = "SYN_LEVANTAMIENTO_FULL.geojson"; a.click();
    }

    function exportCSV() {
        let csv = "ID,X_ESTE,Y_NORTE,ZONA,DISTANCIA,OBS\n";
        datos.forEach((p, i) => { csv += `${i+1},${p.x},${p.y},${p.zone},${p.dist},"${p.obs}"\n`; });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
        a.download = "SYN_REPORTE.csv"; a.click();
    }

    actualizar();
</script>
</body>
</html>
