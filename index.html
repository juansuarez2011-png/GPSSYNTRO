<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geo GPS Syntro Pro - Persistente</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root { 
            --s-navy: #184e77; --s-lime: #d9ed92; --s-blue: #1e6091; --bg: #f4f7f6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; height: 100vh; flex-direction: row; 
            background: var(--bg); overflow: hidden; 
        }
        #map { flex: 1; z-index: 1; height: 100%; transition: all 0.4s ease; }
        .panel { 
            width: 480px; background: white; z-index: 10; display: flex; 
            flex-direction: column; box-shadow: -2px 0 15px rgba(0,0,0,0.1); 
            border-left: 3px solid var(--s-blue); transition: all 0.4s ease;
        }
        .header { 
            background: var(--s-navy); color: white; padding: 12px; 
            text-align: center; border-bottom: 4px solid var(--s-lime); flex-shrink: 0;
        }
        .content { padding: 12px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .data-card { 
            background: #fff; border: 1px solid #e0e0e0; padding: 8px; 
            border-radius: 8px; text-align: center; border-bottom: 3px solid var(--s-blue);
        }
        .data-card label { font-size: 0.6rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; display: block; }
        .data-card span { font-size: 1rem; font-weight: 700; color: var(--s-navy); }
        .btn { 
            min-height: 48px; padding: 10px; border: none; border-radius: 8px; 
            font-weight: bold; text-transform: uppercase; font-size: 0.7rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; 
        }
        .btn-capture { background: var(--s-navy); color: white; flex: 2; box-shadow: 0 4px #0d2b42; }
        .btn-capture:active { transform: translateY(2px); box-shadow: 0 2px #0d2b42; }
        .btn-toggle { background: #f8f9fa; color: var(--s-navy); border: 1px solid var(--s-navy); flex: 1; }
        .table-container { border: 1px solid #e0e0e0; border-radius: 8px; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; min-width: 450px; }
        th { background: #f8f9fa; padding: 10px 5px; border-bottom: 2px solid #ddd; }
        td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; }
        .input-obs { width: 95%; border: 1px solid #ccc; border-radius: 4px; padding: 4px; font-size: 0.65rem; }
        .v-marker { 
            background: var(--s-navy); color: white; border-radius: 50%; 
            width: 24px; height: 24px; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; font-weight: bold; border: 2px solid white; 
        }
        .v-marker.obj { background: #e67e22; }
        body.map-hidden #map { width: 0; flex: none; visibility: hidden; }
        body.map-hidden .panel { width: 100%; border-left: none; }
        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map { height: 35vh; width: 100%; flex: none; }
            .panel { width: 100%; height: 65vh; border-left: none; border-top: 4px solid var(--s-blue); flex: 1; }
            body.map-hidden #map { height: 0; }
            body.map-hidden .panel { height: 100vh; }
        }
    </style>
</head>
<body id="main-body">

<div id="map"></div>

<div class="panel">
    <div class="header">
        <div style="font-size: 0.8rem; font-weight: 800; letter-spacing: 2px;">SYNTRO GPS PRO</div>
    </div>

    <div class="content">
        <div class="dashboard">
            <div class="data-card"><label>Hectáreas</label><span id="res-ha">0.0000</span></div>
            <div class="data-card"><label>Perímetro (m)</label><span id="res-pm">0.00</span></div>
        </div>

        <div style="display:flex; gap:8px;">
            <button class="btn btn-capture" onclick="capturarVértice()">📍 FIJAR PUNTO GPS</button>
            <button class="btn btn-toggle" onclick="toggleMapa()">🎬 MAPA</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>VRT</th>
                        <th>TIPO</th>
                        <th>ESTE (X)</th>
                        <th>NORTE (Y)</th>
                        <th>DIST(m)</th>
                        <th>OBSERVACIÓN</th>
                        <th>ACC</th>
                    </tr>
                </thead>
                <tbody id="tabla-atributos"></tbody>
            </table>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top: auto; padding-bottom: 10px;">
            <button class="btn" style="background:#fff; border:1px solid #ccc;" onclick="exportarCSV()">CSV</button>
            <button class="btn" style="background:#f2dede; color:#a94442; border:1px solid #ebccd1;" onclick="limpiarTodo()">🗑️ BORRAR TODO</button>
        </div>
    </div>
</div>

<script>
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    const wgs84 = "EPSG:4326";
    let verticesData = JSON.parse(localStorage.getItem('syntro_gps_data')) || []; 
    let marcadoresCapas = [];

    const map = L.map('map', { tap: false, zoomControl: false }).setView([10.6447, -71.6106], 15);
    L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);
    
    let poligonoLevantamiento = L.polygon([], {color: '#d9ed92', weight: 3, fillOpacity: 0.4}).addTo(map);

    function toggleMapa() {
        document.getElementById('main-body').classList.toggle('map-hidden');
        setTimeout(() => { map.invalidateSize(); }, 400);
    }

    map.on('click', e => agregarPunto(e.latlng.lat, e.latlng.lng));

    function capturarVértice() {
        if (!navigator.geolocation) return alert("GPS no disponible");
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            map.setView([lat, lng], 19);
            agregarPunto(lat, lng);
        }, err => alert("Error: Verifica permisos de ubicación"), { enableHighAccuracy: true });
    }

    function agregarPunto(lat, lng) {
        const utm = proj4(wgs84, utm19N, [lng, lat]);
        verticesData.push({ 
            id: Date.now(), lat, lng, x: utm[0], y: utm[1], 
            dist: 0, tipo: 'poligono', obs: '' 
        });
        actualizarTodo();
    }

    function actualizarTodo() {
        // Guardar en caché (LocalStorage)
        localStorage.setItem('syntro_gps_data', JSON.stringify(verticesData));
        
        // Limpiar marcadores viejos
        marcadoresCapas.forEach(m => map.removeLayer(m));
        marcadoresCapas = [];
        
        const tbody = document.getElementById('tabla-atributos');
        tbody.innerHTML = "";
        let perimetro = 0;
        let puntosPoligono = [];

        verticesData.forEach((v, i) => {
            // Lógica de distancia corregida
            if (v.tipo === 'poligono') {
                if (puntosPoligono.length > 0) {
                    const prev = puntosPoligono[puntosPoligono.length - 1];
                    v.dist = map.distance(prev, [v.lat, v.lng]);
                    perimetro += v.dist;
                } else { v.dist = 0; }
                puntosPoligono.push([v.lat, v.lng]);
            } else { v.dist = 0; }

            // Dibujar Marcador
            const m = L.marker([v.lat, v.lng], {
                icon: L.divIcon({ 
                    className: `v-marker ${v.tipo === 'objeto' ? 'obj' : ''}`, 
                    html: `V${i+1}` 
                })
            }).addTo(map);
            marcadoresCapas.push(m);

            // Insertar Fila
            tbody.innerHTML += `
                <tr>
                    <td><b>V${i+1}</b></td>
                    <td>
                        <select onchange="cambiarTipo(${v.id}, this.value)" class="select-tipo">
                            <option value="poligono" ${v.tipo === 'poligono'?'selected':''}>Pol</option>
                            <option value="objeto" ${v.tipo === 'objeto'?'selected':''}>Obj</option>
                        </select>
                    </td>
                    <td>${v.x.toFixed(0)}</td>
                    <td>${v.y.toFixed(0)}</td>
                    <td>${v.dist.toFixed(1)}</td>
                    <td><input type="text" class="input-obs" value="${v.obs}" onchange="guardarObs(${v.id}, this.value)"></td>
                    <td><button onclick="eliminarVértice(${v.id})" style="border:none; background:none; cursor:pointer;">❌</button></td>
                </tr>`;
        });

        poligonoLevantamiento.setLatLngs(puntosPoligono);
        document.getElementById('res-pm').innerText = perimetro.toFixed(2);
        
        if (puntosPoligono.length > 2) {
            const area = turf.area(poligonoLevantamiento.toGeoJSON());
            document.getElementById('res-ha').innerText = (area / 10000).toFixed(4);
        } else {
            document.getElementById('res-ha').innerText = "0.0000";
        }
        if(verticesData.length > 0 && !map.getBounds().contains(marcadoresCapas[0].getLatLng())) {
             map.panTo(marcadoresCapas[marcadoresCapas.length-1].getLatLng());
        }
    }

    function cambiarTipo(id, tipo) {
        verticesData.find(v => v.id === id).tipo = tipo;
        actualizarTodo();
    }

    function guardarObs(id, txt) {
        verticesData.find(v => v.id === id).obs = txt;
        localStorage.setItem('syntro_gps_data', JSON.stringify(verticesData));
    }

    function eliminarVértice(id) {
        verticesData = verticesData.filter(v => v.id !== id);
        actualizarTodo();
    }

    function limpiarTodo() {
        if(confirm("¿Seguro que quieres borrar todos los datos guardados?")) {
            verticesData = [];
            actualizarTodo();
        }
    }

    function exportarCSV() {
        let csv = "ID,TIPO,X,Y,DIST_M,OBS\n";
        verticesData.forEach((v, i) => {
            csv += `V${i+1},${v.tipo},${v.x.toFixed(2)},${v.y.toFixed(2)},${v.dist.toFixed(2)},${v.obs}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Syntro_Levantamiento.csv"; a.click();
    }

    // Cargar datos al iniciar
    actualizarTodo();
</script>
</body>
</html>
