<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Syntro GPS Pro V12 - Mapa Base</title>
    
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <script src="proj4.js"></script>
    <script src="turf.min.js"></script>
    
    <style>
        :root { --s-navy: #184e77; --s-lime: #d9ed92; --bg: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #map-container { flex: 1; height: 100vh; position: relative; border-right: 2px solid #ccc; transition: all 0.3s ease; }
        #map { height: 100%; width: 100%; background: #333; }

        /* Estado Oculto */
        #map-container.map-hidden { flex: 0; min-width: 0; width: 0; overflow: hidden; border: none; }

        /* Botón Flotante para abrir/cerrar */
        .btn-toggle-map {
            position: absolute; top: 10px; left: 10px; z-index: 1100;
            padding: 10px 15px; background: white; border: 2px solid var(--s-navy);
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            display: block;
        }

        /* Cuando el mapa está oculto, el botón flota sobre el panel */
        .map-hidden .btn-toggle-map { position: fixed; left: 10px; top: 10px; background: var(--s-lime); color: var(--s-navy); }

        .panel { 
            width: 450px; background: var(--bg); display: flex; flex-direction: column; 
            z-index: 10; height: 100vh; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }

        .header { background: var(--s-navy); color: white; padding: 10px; text-align: center; border-bottom: 4px solid var(--s-lime); }
        .header img { height: 30px; }

        .toolbar { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-gps { grid-column: span 2; background: var(--s-navy); color: white; height: 50px; border: none; font-size: 0.9rem; font-weight: bold; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        button { 
            padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 0.65rem;
            background: var(--bg); color: var(--s-navy);
            box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff;
        }
        button:active { box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px; margin-bottom: 5px; }
        .stat-card { background: var(--bg); padding: 8px; border-radius: 10px; text-align: center; box-shadow: inset 2px 2px 5px #bebebe, inset -2px -2px 5px #ffffff; }
        .stat-card b { font-size: 1rem; color: var(--s-navy); display: block; }

        .table-wrap { flex: 1; overflow: auto; margin: 10px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        th { background: #f1f3f5; padding: 8px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #eee; }
        
        .utm-txt { font-weight: bold; font-family: monospace; }
        .dist-txt { color: #1e6091; font-weight: bold; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            #map-container { height: 40vh; flex: none; width: 100%; }
            #map-container.map-hidden { height: 0; }
            .panel { width: 100%; height: 60vh; }
            .panel.full-screen { height: 100vh; }
        }
    </style>
</head>
<body>

<div id="map-container">
    <button class="btn-toggle-map" onclick="toggleMapa()" id="mapBtn">🗺️ OCULTAR MAPA</button>
    <div id="map"></div>
</div>

<div class="panel" id="sidePanel">
    <div class="header">
        <img src="logo.png" alt="SYNTRO" onerror="this.style.display='none'">
        <div style="font-weight: bold; font-size: 0.8rem; margin-top:5px;">GPS FIELD PRO V12</div>
    </div>

    <div class="toolbar">
        <button class="btn-gps" onclick="capturar()">📍 FIJAR VÉRTICE (GPS)</button>
        <button style="background:#e0e7ff" onclick="document.getElementById('fileIn').click()">📂 IMPORTAR BASE</button>
        <input type="file" id="fileIn" style="display:none" accept=".geojson" onchange="importarBase(event)">
        
        <button id="backupBtn" style="display:none; background: var(--s-lime);" onclick="toggleMapa()">🗺️ MOSTRAR MAPA</button>
        
        <button style="color:#e67e22" onclick="nuevoProyecto()">📁 NUEVO PROYECTO</button>
        <button onclick="exportGeo()">📥 GEOJSON</button>
        <button onclick="exportCSV()">📥 CSV</button>
        <button style="color:red; grid-column: span 2;" onclick="limpiar()">🗑️ BORRAR TODO</button>
    </div>

    <div class="stats">
        <div class="stat-card"><small>ÁREA (ha)</small><b id="area-val">0.0000</b></div>
        <div class="stat-card"><small>PERÍMETRO (m)</small><b id="perim-val">0.00</b></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>VRT</th>
                    <th>UTM X / Y</th>
                    <th>DIST(m)</th>
                    <th>TIPO</th>
                    <th>OBS</th>
                    <th>ELIM</th>
                </tr>
            </thead>
            <tbody id="body-tabla"></tbody>
        </table>
    </div>
</div>

<script>
    const utm19N = "+proj=utm +zone=19 +ellps=WGS84 +datum=WGS84 +units=m +no_defs";
    let datos = JSON.parse(localStorage.getItem('syntro_v12_base')) || [];
    let marcadores = [];
    let capaBase = null;

    const map = L.map('map', { zoomControl: false }).setView([10.64, -71.61], 16);
    const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 22, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Satélite'
    }).addTo(map);

    const capaPol = L.polygon([], {color: '#d9ed92', weight: 3, fillOpacity: 0.3}).addTo(map);

    function toggleMapa() {
        const container = document.getElementById('map-container');
        const panel = document.getElementById('sidePanel');
        const btn = document.getElementById('mapBtn');
        const backupBtn = document.getElementById('backupBtn');
        
        container.classList.toggle('map-hidden');
        
        if(container.classList.contains('map-hidden')) {
            btn.innerText = "🗺️ MOSTRAR MAPA";
            backupBtn.style.display = "block";
            if(window.innerWidth <= 850) panel.classList.add('full-screen');
        } else {
            btn.innerText = "🗺️ OCULTAR MAPA";
            backupBtn.style.display = "none";
            panel.classList.remove('full-screen');
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
    }

    function capturar() {
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            const utm = proj4("EPSG:4326", utm19N, [lng, lat]);
            let d = 0;
            const soloPol = datos.filter(x => x.tipo === 'POL');
            if(soloPol.length > 0) d = map.distance([soloPol[soloPol.length-1].lat, soloPol[soloPol.length-1].lng], [lat, lng]);
            datos.push({ lat, lng, x: utm[0], y: utm[1], tipo: 'POL', obs: '', dist: d });
            actualizar();
            map.panTo([lat, lng]);
        }, null, { enableHighAccuracy: true });
    }

    function actualizar() {
        localStorage.setItem('syntro_v12_base', JSON.stringify(datos));
        marcadores.forEach(m => map.removeLayer(m));
        marcadores = [];
        const tbody = document.getElementById('body-tabla');
        tbody.innerHTML = "";
        let ptsPol = [];
        let totalP = 0;

        datos.forEach((p, i) => {
            const m = L.circleMarker([p.lat, p.lng], { radius: 6, fillColor: p.tipo==='POL'?'#184e77':'#e67e22', color: '#fff', weight: 1, fillOpacity: 1 }).addTo(map).bindTooltip(`V${i+1}`, {permanent:true});
            marcadores.push(m);
            if(p.tipo === 'POL') {
                if(ptsPol.length > 0) totalP += map.distance(ptsPol[ptsPol.length-1], [p.lat, p.lng]);
                ptsPol.push([p.lat, p.lng]);
            }
            tbody.innerHTML += `<tr>
                <td><b>${i+1}</b></td>
                <td class="utm-txt">${p.x.toFixed(0)}<br>${p.y.toFixed(0)}</td>
                <td class="dist-txt">${p.dist.toFixed(1)}</td>
                <td><select onchange="cambiar(${i},'tipo',this.value)"><option value="POL" ${p.tipo==='POL'?'selected':''}>POL</option><option value="PTO" ${p.tipo==='PTO'?'selected':''}>PTO</option></select></td>
                <td><input type="text" value="${p.obs}" onchange="cambiar(${i},'obs',this.value)"></td>
                <td onclick="borrar(${i})" style="cursor:pointer">🗑️</td>
            </tr>`;
        });
        capaPol.setLatLngs(ptsPol);
        document.getElementById('perim-val').innerText = totalP.toFixed(2);
        if(ptsPol.length > 2) document.getElementById('area-val').innerText = (turf.area(capaPol.toGeoJSON())/10000).toFixed(4);
    }

    function importarBase(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const geoData = JSON.parse(ev.target.result);
            if(capaBase) map.removeLayer(capaBase);
            capaBase = L.geoJSON(geoData, {style: { color: '#3b82f6', weight: 2, dashArray: '5,5', fillOpacity: 0 }}).addTo(map);
            map.fitBounds(capaBase.getBounds());
        };
        reader.readAsText(e.target.files[0]);
    }

    function cambiar(i, c, v) { datos[i][c] = v; actualizar(); }
    function borrar(i) { if(confirm("¿Eliminar?")) { datos.splice(i, 1); actualizar(); } }
    function nuevoProyecto() { if(confirm("¿Archivar y nuevo?")) { localStorage.setItem('syn_arc_'+Date.now(), JSON.stringify(datos)); datos = []; actualizar(); } }
    function limpiar() { if(confirm("¿Borrar todo?")) { datos = []; actualizar(); } }
    
    function exportGeo() {
        const fc = { type: "FeatureCollection", features: datos.map((p, i) => ({ type: "Feature", geometry: { type: "Point", coordinates: [p.lng, p.lat] }, properties: { ID: i+1, TIPO: p.tipo, X: p.x, Y: p.y, DIST: p.dist, OBS: p.obs } })) };
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(fc)], {type: 'application/json'})); a.download = `SYN_FIELD_${Date.now()}.geojson`; a.click();
    }

    function exportCSV() {
        let csv = "VRT,TIPO,UTM_X,UTM_Y,DISTANCIA,OBS\n";
        datos.forEach((p, i) => csv += `${i+1},${p.tipo},${p.x},${p.y},${p.dist},"${p.obs}"\n`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'})); a.download = `SYN_DATA.csv`; a.click();
    }
    actualizar();
</script>
</body>
</html>
